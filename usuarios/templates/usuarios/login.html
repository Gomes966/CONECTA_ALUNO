{% extends 'base.html' %}

{% block titulo %}
Login
{% endblock %}

{% block conteudo %}

<div class="card">

    <h2>Entrar</h2>

    <form method="POST">

        {% csrf_token %}

        <p>
            <input
                type="text"
                name="username"
                placeholder="Usuário"
                required>
        </p>

        <p>
            <input
                type="password"
                name="password"
                placeholder="Senha"
                required>
        </p>

        <button type="submit" class="botao">
            Entrar
        </button>

    </form>

</div>

{% endblock %}
